<!DOCTYPE html>
<html>
<head>
    <title>Facebook Login</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
        }

        .container{
            width: 350px;
            margin: 100px auto;
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
            text-align: center;
        }

        h1{
            color: #1877f2;
            font-size: 40px;
        }

        input{
            width: 90%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .login-btn{
            width: 95%;
            padding: 12px;
            background-color: #1877f2;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
        }

        .create-btn{
            width: 70%;
            padding: 12px;
            background-color: #42b72a;
            color: white;
            border: none;
            border-radius: 5px;
            margin-top: 10px;
        }

        a{
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>facebook</h1>

    <form>
        <input type="text" placeholder="Email address or phone number">

        <input type="password" placeholder="Password">

        <button class="login-btn">Log In</button>
    </form>

    <br>

    <a href="#">Forgotten Password?</a>

    <hr>

    <button class="create-btn">Create New Account</button>

</div>

</body>
</html>
