<!DOCTYPE html>
<html>
<head>
    <title>Travel Booking Registration Form</title>
</head>

<body bgcolor="lightcyan">

<center>

<h1> Travel Booking App</h1>
<h3>User Registration Form</h3>

<form>

<table border="1" cellpadding="10">

<tr>
    <td>Full Name</td>
    <td><input type="text" placeholder="Enter Name"></td>
</tr>

<tr>
    <td>Email</td>
    <td><input type="email" placeholder="Enter Email"></td>
</tr>

<tr>
    <td>Mobile Number</td>
    <td><input type="tel" placeholder="Enter Mobile Number"></td>
</tr>

<tr>
    <td>Password</td>
    <td><input type="password" placeholder="Create Password"></td>
</tr>

<tr>
    <td>Gender</td>
    <td>
        <input type="radio" name="gender"> Male
        <input type="radio" name="gender"> Female
    </td>
</tr>

<tr>
    <td>Date of Birth</td>
    <td><input type="date"></td>
</tr>

<tr>
    <td>Preferred Destination</td>
    <td>
        <select>
            <option>Select Destination</option>
            <option>Goa</option>
            <option>Manali</option>
            <option>Jaipur</option>
            <option>Kerala</option>
            <option>Kashmir</option>
        </select>
    </td>
</tr>

<tr>
    <td>Travel Type</td>
    <td>
        <input type="checkbox"> Solo
        <input type="checkbox"> Family
        <input type="checkbox"> Friends
    </td>
</tr>

<tr>
    <td>Travel Date</td>
    <td><input type="date"></td>
</tr>

<tr>
    <td>Upload ID Proof</td>
    <td><input type="file"></td>
</tr>

<tr>
    <td>Address</td>
    <td>
        <textarea rows="4" cols="25"></textarea>
    </td>
</tr>

<tr>
    <td colspan="2" align="center">
        <input type="submit" value="Register">
        <input type="reset" value="Clear">
    </td>
</tr>

</table>

</form>

</center>

</body>
</html>
